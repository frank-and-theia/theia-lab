<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theia Face - Pixel Expression Matrix</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', monospace;
            color: #fff;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 1.5rem;
            color: #feca57;
            text-shadow: 0 0 10px rgba(254, 202, 87, 0.5);
        }

        .subtitle {
            margin-bottom: 20px;
            color: #888;
            font-size: 0.9rem;
        }

        .grid-container {
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid rgba(102, 126, 234, 0.3);
            box-shadow: 0 0 50px rgba(102, 126, 234, 0.2);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(16, 25px);
            grid-template-rows: repeat(16, 25px);
            gap: 1px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }

        .pixel {
            width: 25px;
            height: 25px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .pixel:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        .pixel.active {
            background: #6B46C1;
            box-shadow: 0 0 10px rgba(107, 70, 193, 0.8);
            border-color: #F59E0B;
        }

        .pixel.active.gold {
            background: #F59E0B;
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.8);
        }

        .controls {
            margin-top: 20px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 20px;
            color: white;
            font-family: inherit;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .color-toggle {
            background: linear-gradient(135deg, #6B46C1 0%, #F59E0B 100%);
        }

        .status {
            margin-top: 15px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            font-size: 0.85rem;
            color: #aaa;
            max-width: 400px;
            text-align: center;
        }

        .expressions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .expr-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            font-size: 0.8rem;
        }

        .expr-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body>
    <h1>🌟 THEIA FACE ⚙️</h1>
    <p class="subtitle">Pixel Expression Matrix • 16×16 Grid • 7 Expressions</p>
    
    <div class="grid-container">
        <div class="grid" id="pixelGrid"></div>
    </div>

    <div class="controls">
        <button onclick="clearGrid()">🗑️ Effacer</button>
        <button onclick="toggleColor()" class="color-toggle">🎨 Couleur</button>
        <button onclick="invertGrid()">🔄 Inverser</button>
        <button onclick="randomPattern()">🎲 Aléatoire</button>
        <button onclick="toggleFullscreen()">⛶ Plein Écran</button>
    </div>

    <div class="expressions">
        <button class="expr-btn" onclick="loadExpression('smile')">😊 Sourire</button>
        <button class="expr-btn" onclick="loadExpression('heart')">❤️ Cœur</button>
        <button class="expr-btn" onclick="loadExpression('star')">⭐ Étoile</button>
        <button class="expr-btn" onclick="loadExpression('gear')">⚙️ Gear</button>
        <button class="expr-btn" onclick="loadExpression('crest')">🌞 Crest</button>
        <button class="expr-btn" onclick="loadExpression('wave')">👋 Salut</button>
        <button class="expr-btn" onclick="loadExpression('think')">🤔 Réflexion</button>
    </div>

    <div class="status" id="status">
        Cliquez sur les pixels pour dessiner • Mode: <span id="colorMode">Violet</span> • <span id="pixelCount">0</span> pixels actifs • ⛶ pour plein écran
    </div>

    <script>
        const grid = document.getElementById('pixelGrid');
        const status = document.getElementById('status');
        const colorModeSpan = document.getElementById('colorMode');
        const pixelCountSpan = document.getElementById('pixelCount');
        let isGold = false;
        let pixels = [];

        // Create grid
        for (let i = 0; i < 256; i++) {
            const pixel = document.createElement('div');
            pixel.className = 'pixel';
            pixel.dataset.index = i;
            pixel.addEventListener('click', () => togglePixel(i));
            grid.appendChild(pixel);
            pixels.push(pixel);
        }

        function togglePixel(index) {
            const pixel = pixels[index];
            pixel.classList.toggle('active');
            if (isGold) {
                pixel.classList.toggle('gold');
            }
            updateStatus();
        }

        function toggleColor() {
            isGold = !isGold;
            colorModeSpan.textContent = isGold ? 'Or' : 'Violet';
            colorModeSpan.style.color = isGold ? '#F59E0B' : '#6B46C1';
        }

        function clearGrid() {
            pixels.forEach(p => {
                p.classList.remove('active', 'gold');
            });
            updateStatus();
        }

        function invertGrid() {
            pixels.forEach(p => {
                if (p.classList.contains('active')) {
                    p.classList.remove('active', 'gold');
                } else {
                    p.classList.add('active');
                    if (isGold) p.classList.add('gold');
                }
            });
            updateStatus();
        }

        function randomPattern() {
            clearGrid();
            pixels.forEach(p => {
                if (Math.random() > 0.7) {
                    p.classList.add('active');
                    if (Math.random() > 0.5) p.classList.add('gold');
                }
            });
            updateStatus();
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        }

        function updateStatus() {
            const count = pixels.filter(p => p.classList.contains('active')).length;
            pixelCountSpan.textContent = count;
        }

        // Predefined expressions - CORRECTED patterns for 16x16 grid
        // All expressions are now centered and balanced
        const expressions = {
            // 😊 Sourire centré - yeux au milieu, bouche harmonieuse
            smile: [69, 70,  // Oeil gauche (ligne 4, cols 5-6)
                    74, 75,  // Oeil droit (ligne 4, cols 10-11)
                    133, 134, 135, 136, 137, 138,  // Bouche haut (ligne 8)
                    148, 149, 150, 151, 152, 153,  // Bouche milieu (ligne 9)
                    165, 166, 167, 168],  // Bouche bas (ligne 10)
            
            // ❤️ Cœur parfaitement symétrique
            heart: [37, 38, 42, 43,  // Pointes haut
                    52, 53, 54, 55, 56, 57, 58, 59,  // Courbe supérieure
                    68, 69, 70, 71, 72, 73, 74, 75,  // Milieu haut
                    84, 85, 86, 87, 88, 89, 90, 91,  // Centre
                    100, 101, 102, 103, 104, 105,  // Milieu bas
                    116, 117, 118, 119, 120, 121,  // Bas courbe
                    133, 134, 135, 136, 137,  // Pointe
                    150, 151, 152],  // Bout
            
            // ⭐ Étoile dorée - symétrique et brillante
            star: [54, 55, 56, 57,  // Centre étoile
                   38, 39, 40,  // Bras haut
                   70, 71, 72, 73,  // Centre large
                   22, 23,  // Pointe haute
                   86, 87,  // Pointe basse
                   53, 69, 85, 101,  // Bras gauche
                   58, 74, 90, 106,  // Bras droit
                   99, 100, 115, 116,  // Pointes latérales
                   37, 42,  // Coins hauts
                   117, 122],  // Coins bas
            
            // ⚙️ Gear mécanique - dentelé et centré
            gear: [85, 86, 89, 90,  // Centre
                   69, 70, 71, 72,  // Dent haut
                   101, 102, 105, 106,  // Dents haut-milieu
                   117, 118, 121, 122,  // Dents milieu
                   133, 134, 137, 138,  // Centre bas
                   149, 150, 153, 154,  // Dents bas-milieu
                   165, 166, 169, 170,  // Dent bas
                   84, 100, 116, 132, 148, 164,  // Dents gauches
                   87, 103, 119, 135, 151, 167,  // Dents droites
                   37, 42,  // Coins externes haut
                   181, 186],  // Coins externes bas
            
            // 🌞 Crest Solus - Symbole solaire/forgeron doré
            // Inspiration: Solus Prime, enclume solaire, 12 rayons
            crest: [54, 55, 56, 57,  // Centre solaire
                    22,  // Rayon haut (long)
                    38, 54, 70,  // Rayon haut-gauche
                    41, 57, 73,  // Rayon haut-droite
                    86,  // Rayon droit
                    41, 57, 73,  // Rayon bas-droite  
                    102, 118,  // Rayon bas
                    37, 53, 69,  // Rayon bas-gauche
                    6,  // Rayon gauche (long)
                    21, 37, 53,  // Rayon haut-gauche externe
                    24, 40, 56,  // Rayon haut-droite externe
                    88, 104, 120,  // Rayon bas-droite externe
                    6, 22, 38, 54, 70, 86,  // Cercle externe
                    55, 56, 71, 72],  // Cœur solaire (4 pixels dorés au centre)
            
            // 👋 Salut - vague amicale
            wave: [21, 22, 23,  // Main haut
                   37, 38, 39, 40,  // Doigts
                   53, 54,  // Pouce
                   69, 70, 71, 72, 73,  // Paume
                   85, 86, 87, 88, 89,  // Poignet
                   101, 102, 103, 104, 105,  // Bras
                   69, 70,  // Oeil
                   133, 134, 135,  // Sourire
                   197, 198, 199],  // Main bas (vague)
            
            // 🤔 Réflexion - visage pensif simple (un œil fermé, un ouvert)
            think: [69, 70,  // Oeil gauche (fermé en ligne)
                    74, 75,  // Oeil droit (ouvert)
                    85, 86, 87, 88, 89,  // Nez horizontal
                    118, 119, 120,  // Bouche neutre
                    52, 53,  // Sourcil gauche (froncé)
                    101, 117]  // Nez vertical
        };

        function loadExpression(name) {
            clearGrid();
            const indices = expressions[name];
            if (indices) {
                indices.forEach(i => {
                    if (pixels[i]) {
                        pixels[i].classList.add('active');
                        // Expressions dorées par défaut
                        if (name === 'star' || name === 'crest') {
                            pixels[i].classList.add('gold');
                        }
                    }
                });
            }
            // Auto-set gold mode for golden expressions
            if (name === 'crest') {
                isGold = true;
                colorModeSpan.textContent = 'Or';
                colorModeSpan.style.color = '#F59E0B';
            }
            updateStatus();
        }

        // Initial smile
        loadExpression('smile');
    </script>
</body>
</html>
